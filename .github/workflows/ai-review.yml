# This repo's own PR review workflow (also a working example of the consumer template).
# It runs no-key checks and intentionally skips metered API AI review by default.
name: ai-review
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write   # to post the review comment
  issues: write          # PR comments go through the issues comments API

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Reviewer self-test
        run: node scripts/ai-review-self-test.mjs
      - name: PR body + branch check (warn-only, no key needed)
        run: node scripts/pr-body-check.mjs --repo "$GITHUB_REPOSITORY" --pr "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
      - name: API review skipped
        run: echo "::notice::GitHub Action API AI review is intentionally disabled. Run local claude-cli review for deep/gate/confirm-fixes rounds."
