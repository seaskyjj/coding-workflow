# Drop into a PRODUCT repo as .github/workflows/ai-review.yml
# PR review workflow using the reusable coding-workflow tooling (checked out alongside).
# Degrades gracefully (job stays green) until the tooling repo is reachable — make
# seaskyjj/coding-workflow public, OR set
#      CODING_WORKFLOW_TOKEN (the default GITHUB_TOKEN cannot read other repos);
# GitHub Action API AI review is intentionally skipped by default. Run local
# claude-cli review for deep/gate/confirm-fixes rounds.
# Edit the `repository:` value to your coding-workflow location.
name: ai-review
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ai-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write          # PR comments go through the issues comments API

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4            # product repo (root may hold reviewer-overlay.md)
      - name: Checkout reviewer tooling
        id: tools
        continue-on-error: true             # unreachable tooling -> skip rest, don't fail the PR
        uses: actions/checkout@v4
        with:
          repository: seaskyjj/coding-workflow   # <-- set to your coding-workflow repo
          path: .coding-workflow-tools
          # token: ${{ secrets.CODING_WORKFLOW_TOKEN }}   # uncomment if coding-workflow is private
      - name: Tooling unavailable notice
        if: steps.tools.outcome != 'success'
        run: echo "::notice::coding-workflow tooling not reachable (private without CODING_WORKFLOW_TOKEN?). Make it public or add the token. Skipping review."
      - uses: actions/setup-node@v4
        if: steps.tools.outcome == 'success'
        with:
          node-version: '22'
      - name: Reviewer mode contract check
        if: steps.tools.outcome == 'success'
        run: |
          for token in REVIEW_MODE REVIEW_PROFILE MAX_FINDINGS; do
            if ! grep -q "$token" .coding-workflow-tools/scripts/ai-review.mjs; then
              echo "::error::coding-workflow ai-review.mjs does not support $token; update the tooling checkout before relying on staged review modes."
              exit 1
            fi
          done
      - name: PR body + branch check (warn-only, no key needed)
        if: steps.tools.outcome == 'success'
        run: node .coding-workflow-tools/scripts/pr-body-check.mjs --repo "$GITHUB_REPOSITORY" --pr "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
      - name: API review skipped
        if: steps.tools.outcome == 'success'
        run: echo "::notice::GitHub Action API AI review is intentionally disabled. Run local claude-cli review for deep/gate/confirm-fixes rounds."
