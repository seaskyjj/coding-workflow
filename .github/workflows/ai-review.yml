# This repo's own PR reviewer (also a working example of the consumer template).
name: ai-review
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write   # to post the review comment
  issues: write          # PR comments go through the issues comments API

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Reviewer self-test
        run: node scripts/ai-review-self-test.mjs
      - name: PR body + branch check (warn-only, no key needed)
        run: node scripts/pr-body-check.mjs --repo "$GITHUB_REPOSITORY" --pr "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
      - name: Check API key
        id: key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::notice::ANTHROPIC_API_KEY not set — skipping AI review. Add the secret to enable."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - name: AI review
        if: steps.key.outputs.enabled == 'true'
        run: node scripts/ai-review.mjs --repo "$GITHUB_REPOSITORY" --pr "${{ github.event.pull_request.number }}"
        env:
          REVIEW_BACKEND: api                            # ephemeral CI runner -> metered API key
          REVIEW_COMMENT_ID: claude
          REVIEW_MODE: ${{ vars.REVIEW_MODE || 'deep' }}
          REVIEW_PROFILE: ${{ contains(github.event.pull_request.labels.*.name, 'review:pilot-minimal') && 'pilot_minimal' || 'standard' }}
          MAX_FINDINGS: ${{ vars.MAX_FINDINGS || '12' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}   # optional repo variable; script has a default
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}          # gh reads GH_TOKEN
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_LOG_PATH: pr_log.jsonl
          # REVIEW_FAIL_ON: request_changes   # uncomment to also fail the check on that verdict
      - name: Upload pr_log artifact   # derived/regenerable; CI is ephemeral so keep a copy
        if: ${{ always() && steps.key.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-log-${{ github.event.pull_request.number }}
          path: pr_log.jsonl
          if-no-files-found: ignore
