# Drop into a PRODUCT repo as .github/workflows/ai-review.yml
# Auto-triggers the AI reviewer on every PR. The reviewer scripts live in the
# separate `coding-workflow` repo, which this workflow checks out alongside.
#
# Prereqs in the product repo:
#   - secret  ANTHROPIC_API_KEY
#   - (if coding-workflow is private) secret CODING_WORKFLOW_TOKEN with repo read access
#   - edit the `repository:` below to your coding-workflow location
name: ai-review
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4            # product repo
      - uses: actions/checkout@v4            # the reusable workflow tooling
        with:
          repository: seaskyjj/coding-workflow   # <-- set to your coding-workflow repo
          path: .coding-workflow
          # token: ${{ secrets.CODING_WORKFLOW_TOKEN }}   # uncomment if coding-workflow is private
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: PR body check (warn-only)
        run: node .coding-workflow/scripts/pr-body-check.mjs --repo "$GITHUB_REPOSITORY" --pr "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
      - name: AI review
        # optional project-specific rules: commit .coding-workflow/reviewer-overlay.md in the product repo
        run: node .coding-workflow/scripts/ai-review.mjs --repo "$GITHUB_REPOSITORY" --pr "${{ github.event.pull_request.number }}"
        env:
          REVIEW_BACKEND: api
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          REVIEWER_OVERLAY: reviewer-overlay.md   # product-repo overlay if present (else auto-skip)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_LOG_PATH: pr_log.jsonl
      - name: Upload pr_log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-log-${{ github.event.pull_request.number }}
          path: pr_log.jsonl
          if-no-files-found: ignore
